<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />

  <body>
    <h1>Quiz About Sharks</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
         What is the biggest shark?
        <select id="movie-answer">
          <option value="movie1">Basking Shark
        </option>
          <option value="movie2">Whale Shark</option>
          <option value="movie3">Bull Shark</option>
          <option value="movie4">Goblin Shark</option>
        </select>
      </label>
      <button type="submit">Check Shark Answer</button>
    </form>




    <div id="movie-result">
      <p id="movie-text"></p>
       <img class="bam" width="500">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
         What is the weirdist looking shark?
        <select id="book-answer">
          <option value="book1">Great White</option>
          <option value="book2">Bull Shark</option>
          <option value="book3">Goblin Shark</option>
          <option value="book4">Jaws</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>


<img src="https://content.imageresizer.com/images/memes/Human-teeth-shark-meme-5.jpg"


    </form>
    <div id="book-result">
      <p id="book-text"></p>
   
      <div id="movieresult">
        <p id="movie-text"></p>
          <img class="woeo" width="500">
      </div>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie2") {
          $("#movie-text").text("yes! A Whale Shark at largest can grow up to 40 feet.")
          $(".bam").hide().attr("src","https://scx2.b-cdn.net/gfx/news/hires/2018/1-whalesharklo.jpg").fadeIn(2000)
          ;
        } 
        else {
          $("#movie-text").text("Try Again!");
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book3") {
          $("#book-text").text("yes! The Goblin Shark has a slingshot-like jaw that can rapidly protrude to catch prey in deep seas.")
          $(".woeo").attr("src","https://external-preview.redd.it/hzWHbroe5wa5YYdFzEwNjFhDa3Wv79vANODfnt1UU2A.png?auto=webp&s=4c5158b8aaeeede97041ebc2496e8a4b89c1147c").animate({
            width: "400px",
            marginLeft:"100px",
            borderWidth:"3px"},
            2000);




    
          
          
          
          
          
          
          
          
          
          
          
        } 
        else {
          $("#book-text").text("Try Again!");



        }
      });
      
    </script>
